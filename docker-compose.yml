version: '3.8'

services:
  # ============================================
  # Container 1: Web Server - Nginx
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nhatromana_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - nhatromana_network

  # ============================================
  # Container 2: PHP-FPM (Laravel Application)
  # ============================================
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: nhatromana_php
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
    environment:
      - APP_NAME=NhaTroMana
      - APP_ENV=local
      - APP_KEY=base64:YourAppKeyHere32CharactersLongXX=
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nhatromana
      - DB_USERNAME=nhatromana_user
      - DB_PASSWORD=nhatromana_pass
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nhatromana_network

  # ============================================
  # Container 3: Database - MySQL
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: nhatromana_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nhatromana
      MYSQL_USER: nhatromana_user
      MYSQL_PASSWORD: nhatromana_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nhatromana_network

  # ============================================
  # Container 4: phpMyAdmin (Quản lý DB)
  # ============================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: nhatromana_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: nhatromana_user
      PMA_PASSWORD: nhatromana_pass
    depends_on:
      - mysql
    networks:
      - nhatromana_network

# ============================================
# Volumes & Networks
# ============================================
volumes:
  mysql_data:
    driver: local

networks:
  nhatromana_network:
    driver: bridge
